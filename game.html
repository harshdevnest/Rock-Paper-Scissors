<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS</title>
    <link rel="stylesheet" href="game.css">
</head>

<body>
    <div class="container">
        <h1>Rock Paper Scissor</h1>

        <button class="game-btn" id="rock" onclick="result('rock')">Rock</button>



        <button class="game-btn" id="paper" onclick=" result('paper')">Paper</button>



        <button class="game-btn" id="scissor" onclick="result('scissors')">Scissor</button>



        <h1 id="botschoice">Bots choice :</h1>
        <h1 id="result">Result :</h1>
        <h1 id="score">Score :</h1>
        <button onclick="freshGame()">Reset</button>
    </div>

   <script src="game.js"></script>
</body>

</html>
